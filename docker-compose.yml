services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      DATABASE_URL: file:/data/dev.db
      STORAGE_ROOT: /data/storage
      COOKIE_SECURE: "false"
      TZ: Asia/Kolkata
      APP_TIMEZONE: Asia/Kolkata
      APP_DAY_START_HOUR: "6"
    volumes:
      - wfh-data:/data
    restart: unless-stopped

volumes:
  wfh-data:
