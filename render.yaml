services:
  - type: web
    name: wfh-web
    env: node
    plan: free
    buildCommand: npm ci && npm run prisma:generate -w apps/web && npm run build -w apps/web
    startCommand: npm run prisma:migrate:deploy -w apps/web && npm run prisma:seed -w apps/web && npm run start -w apps/web
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        value: file:/var/data/dev.db
      - key: STORAGE_ROOT
        value: /var/data/storage
      - key: JWT_SECRET
        generateValue: true
      - key: SCREENSHOT_SIGNING_SECRET
        generateValue: true
      - key: AGENT_INGEST_TOKEN
        generateValue: true
    disk:
      name: wfh-data
      mountPath: /var/data
      sizeGB: 1
